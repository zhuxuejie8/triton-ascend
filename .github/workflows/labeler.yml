name: PR Labeler & Codeowner Notify

on:
  pull_request_target:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v5
        with:
          configuration-path: .github/actions/labeler.yml
          sync-labels: true

  notify-codeowners:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Comment code owners based on changed files
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          CHANGED_FILES=$(gh pr view "$PR_NUMBER" --json files -q '.files[].path')
          > /tmp/owners.txt
          declare -A FILE_TO_OWNER

          while IFS= read -r line; do
            [[ -z "$line" || "$line" =~ ^[[:space:]]*# ]] && continue
            PATTERN=$(echo "$line" | awk '{print $1}')
            OWNER_LIST=$(echo "$line" | cut -d' ' -f2-)
            PATTERN="${PATTERN#/}"

            for file in $CHANGED_FILES; do
              MATCH=0
              case "$PATTERN" in
                "*")  MATCH=1 ;;
                */)   [[ "$file" == "$PATTERN"* ]] && MATCH=1 ;;
                *.*)  EXT="${PATTERN#\*}"; [[ "$file" == *"$EXT" ]] && MATCH=1 ;;
                */*)  [[ "$file" == "$PATTERN" || "$file" == "$PATTERN"/* ]] && MATCH=1 ;;
                *)    [[ "$(basename "$file")" == "$PATTERN" ]] && MATCH=1 ;;
              esac
              [ "$MATCH" -eq 1 ] && FILE_TO_OWNER["$file"]="$OWNER_LIST"
            done
          done < .github/CODEOWNERS

          # Build owner -> files mapping
          declare -A OWNER_FILES
          for file in "${!FILE_TO_OWNER[@]}"; do
            for owner in ${FILE_TO_OWNER[$file]}; do
              OWNER_FILES["$owner"]="${OWNER_FILES[$owner]}"$'\n'"- \`$file\`"
            done
          done

          if [ ${#OWNER_FILES[@]} -eq 0 ]; then
            echo "No specific CODEOWNERS matched. Skipping."
            exit 0
          fi

          # Build formatted comment
          BODY="📂 **Code Owners** — the following files under code ownership were modified.

          Please review:"
          BODY+=$'\n'

          for owner in $(printf '%s\n' "${!OWNER_FILES[@]}" | sort -u); do
            BODY+=$'\n'"**${owner}**"
            BODY+=$(printf '%s' "${OWNER_FILES[$owner]}" | sort -u)
            BODY+=$'\n'
          done

          BODY+=$'\n'"<sub>🤖 Generated by labeler workflow</sub>"

          OLD_IDS=$(gh api "/repos/${{ github.repository }}/issues/$PR_NUMBER/comments" \
            -q '.[] | select(.body | contains("🤖 Generated by labeler workflow")) | .id' 2>/dev/null)
          for id in $OLD_IDS; do
            gh api -X DELETE "/repos/${{ github.repository }}/issues/comments/$id"
          done

          gh pr comment "$PR_NUMBER" --body "$BODY"
